<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poszukaj Mnie Panie</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .pattern-bg {
            background-color: #e7e5e4;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(0,0,0,.05) 35px, rgba(0,0,0,.05) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(0,0,0,.03) 35px, rgba(0,0,0,.03) 70px);
        }
        .gold-bucket {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 60%, 80% 100%, 20% 100%, 0% 60%);
            width: 30px;
            height: 30px;
            display: inline-block;
        }
        .silver-bucket {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 60%, 80% 100%, 20% 100%, 0% 60%);
            width: 28px;
            height: 28px;
            display: inline-block;
        }
        .bronze-bucket {
            background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%);
            clip-path: polygon(25% 0%, 75% 0%, 100% 60%, 80% 100%, 20% 100%, 0% 60%);
            width: 26px;
            height: 26px;
            display: inline-block;
        }
        .medal-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .rank-row {
            transition: all 0.3s ease;
        }
        .rank-row:hover {
            transform: scale(1.02);
            background-color: rgba(251, 146, 60, 0.1);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .slide-in {
            animation: slideIn 0.5s ease;
        }
    </style>
</head>
<body class="pattern-bg overflow-x-hidden">
    <div id="root"></div>
    
    <!-- Logo w prawym dolnym rogu -->
    <div class="fixed bottom-4 right-4 z-40 shadow-lg rounded-full overflow-hidden border-2 border-white">
        <img src="IMG_20260505_155346.png" alt="Logo" class="w-24 h-24 object-cover">
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Dopasowane do Twoich plików
        const IMAGE_FILES = ['1.jpeg', '2.jpeg', '3.jpeg', '4.png', '5.png', '6.png', '7.png', '8.png'];

        const RankingBadge = ({ position }) => {
            if (position === 1) {
                return (
                    <div className="medal-badge" style={{width: '40px', height: '40px', background: 'linear-gradient(135deg, #FFD700 0%, #FFA500 100%)'}}>
                        🥇
                    </div>
                );
            } else if (position === 2) {
                return (
                    <div className="medal-badge" style={{width: '38px', height: '38px', background: 'linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%)'}}>
                        🥈
                    </div>
                );
            } else if (position === 3) {
                return (
                    <div className="medal-badge" style={{width: '36px', height: '36px', background: 'linear-gradient(135deg, #CD7F32 0%, #8B4513 100%)'}}>
                        🥉
                    </div>
                );
            }
            return <span className="text-lg font-bold text-stone-400">#{position}</span>;
        };

        const Ranking = ({ isOpen, onClose }) => {
            const [rankings, setRankings] = useState([]);

            useEffect(() => {
                if (isOpen) {
                    const saved = localStorage.getItem('memoPmpRankings');
                    if (saved) {
                        const allRankings = JSON.parse(saved)
                            .sort((a, b) => {
                                if (a.seconds !== b.seconds) return a.seconds - b.seconds;
                                return a.moves - b.moves;
                            })
                            .slice(0, 50);
                        setRankings(allRankings);
                    }
                }
            }, [isOpen]);

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-stone-900/90 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden shadow-2xl">
                        <div className="bg-gradient-to-r from-stone-800 to-amber-900 text-white p-6 sticky top-0">
                            <h2 className="text-2xl font-bold">🏆 Ranking Top 50</h2>
                        </div>
                        <div className="overflow-y-auto" style={{maxHeight: 'calc(90vh - 140px)'}}>
                            {rankings.length === 0 ? (
                                <div className="p-8 text-center text-stone-500">
                                    <p className="text-lg">Brak wyników. Zagraj i zapisz się w rankingu!</p>
                                </div>
                            ) : (
                                <div className="p-4 space-y-2">
                                    {rankings.map((entry, idx) => (
                                        <div key={idx} className="rank-row bg-white border-l-4 border-amber-500 pl-4 pr-4 py-3 rounded flex items-center justify-between hover:shadow-md">
                                            <div className="flex items-center gap-4 flex-1">
                                                <RankingBadge position={idx + 1} />
                                                <div>
                                                    <p className="font-bold text-stone-800 text-lg">{entry.nickname}</p>
                                                    <p className="text-xs text-stone-500">{new Date(entry.date).toLocaleDateString('pl-PL')}</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-6 text-right">
                                                <div>
                                                    <p className="text-xs text-stone-500">Czas</p>
                                                    <p className="font-bold text-stone-800">{entry.time}</p>
                                                </div>
                                                <div>
                                                    <p className="text-xs text-stone-500">Ruchy</p>
                                                    <p className="font-bold text-stone-800">{entry.moves}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        <div className="bg-stone-50 p-4 border-t text-center">
                            <button 
                                onClick={onClose}
                                className="px-6 py-2 bg-stone-800 text-white rounded-full font-bold text-sm hover:bg-stone-900 transition"
                            >
                                Zamknij
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const NicknamePrompt = ({ isOpen, onSave, onSkip, seconds, moves }) => {
            const [nickname, setNickname] = useState('');

            const handleSave = () => {
                if (nickname.trim().length > 0) {
                    onSave(nickname.trim());
                } else {
                    alert('Wprowadź swój nick!');
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-stone-900/90 flex items-center justify-center z-50 p-6">
                    <div className="bg-white p-8 rounded-2xl text-center max-w-xs w-full shadow-2xl animate-bounce">
                        <h3 className="text-xl font-bold mb-4 text-stone-800">Zapisz się w rankingu!</h3>
                        <p className="text-stone-600 mb-4 text-sm">Twój wynik:</p>
                        <div className="bg-stone-50 p-3 rounded-lg mb-6 space-y-2">
                            <p className="text-sm"><span className="text-stone-500">⏱️ Czas:</span> <span className="font-bold text-amber-600">{seconds}</span></p>
                            <p className="text-sm"><span className="text-stone-500">🎯 Ruchy:</span> <span className="font-bold text-amber-600">{moves}</span></p>
                        </div>
                        <input
                            type="text"
                            placeholder="Wpisz swój nick..."
                            value={nickname}
                            onChange={(e) => setNickname(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && handleSave()}
                            maxLength="20"
                            className="w-full px-4 py-2 border-2 border-amber-300 rounded-lg mb-4 text-center focus:outline-none focus:border-amber-500"
                            autoFocus
                        />
                        <div className="flex gap-3">
                            <button 
                                onClick={handleSave}
                                className="flex-1 bg-amber-500 hover:bg-amber-600 text-white py-2 rounded-lg font-bold transition"
                            >
                                Zapisz
                            </button>
                            <button 
                                onClick={onSkip}
                                className="flex-1 bg-stone-300 hover:bg-stone-400 text-stone-800 py-2 rounded-lg font-bold transition"
                            >
                                Pomiń
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);
            const [moves, setMoves] = useState(0);
            const [seconds, setSeconds] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [showNicknamePrompt, setShowNicknamePrompt] = useState(false);
            const [showRanking, setShowRanking] = useState(false);
            const timerRef = useRef(null);

            const init = () => {
                const deck = [...IMAGE_FILES, ...IMAGE_FILES]
                    .sort(() => Math.random() - 0.5)
                    .map((img, i) => ({ id: i, img }));
                setCards(deck);
                setFlipped([]);
                setSolved([]);
                setMoves(0);
                setSeconds(0);
                setIsActive(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            useEffect(() => { init(); }, []);

            useEffect(() => {
                if (isActive && solved.length < cards.length) {
                    timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                } else { clearInterval(timerRef.current); }
                return () => clearInterval(timerRef.current);
            }, [isActive, solved.length]);

            const handleClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                if (!isActive) setIsActive(true);
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setDisabled(true);
                    setMoves(m => m + 1);
                    if (cards[newFlipped[0]].img === cards[newFlipped[1]].img) {
                        setSolved(s => [...s, ...newFlipped]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => { setFlipped([]); setDisabled(false); }, 1000);
                    }
                }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const handleSaveToRanking = (nickname) => {
                const ranking = {
                    nickname: nickname,
                    time: formatTime(seconds),
                    seconds: seconds,
                    moves: moves,
                    date: new Date().toISOString()
                };

                const saved = localStorage.getItem('memoPmpRankings');
                let rankings = saved ? JSON.parse(saved) : [];
                rankings.push(ranking);
                localStorage.setItem('memoPmpRankings', JSON.stringify(rankings));
                
                setShowNicknamePrompt(false);
                init();
            };

            const handleSkipRanking = () => {
                setShowNicknamePrompt(false);
                init();
            };

            return (
                <div className="flex flex-col items-center p-2 min-h-screen">
                    <div className="flex justify-between items-center w-full max-w-sm mb-4">
                        <h1 className="text-xl font-black text-stone-800 uppercase tracking-widest">Poszukaj Mnie Panie</h1>
                        <button 
                            onClick={() => setShowRanking(true)}
                            className="px-3 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-full font-bold text-xs transition"
                        >
                            🏆 Ranking
                        </button>
                    </div>

                    <div className="flex gap-4 mb-6 text-sm font-bold text-stone-500 bg-white px-4 py-2 rounded-full border shadow-sm">
                        <span>⏱️ Czas: {formatTime(seconds)}</span>
                        <span>🎯 Ruchy: {moves}</span>
                    </div>

                    <div className="grid grid-cols-4 gap-2 w-full max-w-sm">
                        {cards.map(c => (
                            <div key={c.id} onClick={() => handleClick(c.id)} className="aspect-square cursor-pointer perspective-1000">
                                <div className={`relative w-full h-full transition-all duration-500 transform-style-3d ${flipped.includes(c.id) || solved.includes(c.id) ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute w-full h-full backface-hidden bg-stone-800 rounded-lg flex items-center justify-center text-white font-bold border-2 border-stone-600 text-3xl">
                                        ?
                                    </div>
                                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white rounded-lg border-2 border-amber-500 overflow-hidden shadow-md">
                                        <img src={c.img} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={init} className="mt-8 px-6 py-2 bg-stone-800 text-white rounded-full font-bold text-xs uppercase tracking-widest hover:bg-stone-900 transition">
                        Nowa gra
                    </button>

                    {solved.length === cards.length && cards.length > 0 && (
                        <div className="fixed inset-0 bg-stone-900/90 flex items-center justify-center z-50 p-6 slide-in">
                            <div className="bg-white p-8 rounded-2xl text-center max-w-xs w-full shadow-2xl">
                                <h2 className="text-2xl font-bold mb-6 text-stone-800">🎉 Wygrana! 🎉</h2>
                                <div className="space-y-3 mb-6 bg-stone-50 p-4 rounded-lg">
                                    <div className="text-lg font-semibold text-stone-700">
                                        <span className="block text-stone-500 text-sm mb-1">Czas</span>
                                        <span className="text-2xl text-amber-600">⏱️ {formatTime(seconds)}</span>
                                    </div>
                                    <div className="text-lg font-semibold text-stone-700">
                                        <span className="block text-stone-500 text-sm mb-1">Liczba ruchów</span>
                                        <span className="text-2xl text-amber-600">🎯 {moves}</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setShowNicknamePrompt(true)}
                                    className="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-bold uppercase tracking-wider transition mb-2"
                                >
                                    Zapisz się w rankingu
                                </button>
                                <button 
                                    onClick={init}
                                    className="w-full bg-stone-300 hover:bg-stone-400 text-stone-800 py-3 rounded-xl font-bold uppercase tracking-wider transition"
                                >
                                    Nowa gra
                                </button>
                            </div>
                        </div>
                    )}

                    <NicknamePrompt 
                        isOpen={showNicknamePrompt}
                        onSave={handleSaveToRanking}
                        onSkip={handleSkipRanking}
                        seconds={formatTime(seconds)}
                        moves={moves}
                    />

                    <Ranking 
                        isOpen={showRanking}
                        onClose={() => setShowRanking(false)}
                    />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
