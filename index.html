<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poszukaj Mnie Panie</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .pattern-bg {
            background-color: #1a1a1a; /* Kolor zapasowy */
            background-image: url('1777988250540-019df85b-53a7-74e3-9ff1-6179b1df9a37.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .gothic-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }

        .ranking-modal-content {
            background-color: #f5f5f5;
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('okno rankingowe.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid #d4a574;
        }

        .rank-row {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        
        .rank-row:hover { transform: translateX(5px); }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
    </style>
</head>
<body class="pattern-bg min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IMAGE_FILES = ['1.jpeg', '2.jpeg', '3.jpeg', '4.png', '5.png', '6.png', '7.png', '8.png'];

        const FullRankingModal = ({ isOpen, onClose, rankings }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4">
                    <div className="ranking-modal-content rounded-3xl max-w-lg w-full max-h-[80vh] overflow-hidden shadow-2xl flex flex-col border-4 border-amber-600/30">
                        <div className="bg-stone-900 text-white p-6 text-center">
                            <h2 className="text-2xl font-bold tracking-widest uppercase" style={{fontFamily: 'Cinzel'}}>Sala Bohaterów</h2>
                        </div>
                        <div className="overflow-y-auto p-4 space-y-3 flex-1">
                            {(!rankings || rankings.length === 0) ? (
                                <p className="text-center p-10 font-bold text-stone-600">Ranking jest jeszcze pusty...</p>
                            ) : (
                                rankings.map((entry, idx) => (
                                    <div key={idx} className="rank-row p-4 rounded-xl flex items-center justify-between shadow-md border-b-2 border-stone-200">
                                        <div className="flex items-center gap-4">
                                            <span className={`text-xl font-black w-8 ${idx < 3 ? 'text-amber-500' : 'text-stone-400'}`}>#{idx + 1}</span>
                                            <div>
                                                <p className="font-bold text-stone-900 text-lg">{entry.nickname}</p>
                                                <p className="text-[10px] text-stone-500 uppercase">{new Date(entry.date).toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-bold text-amber-700">{entry.time}</p>
                                            <p className="text-[10px] text-stone-400">{entry.moves} ruchów</p>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                        <button onClick={onClose} className="m-6 py-4 bg-amber-600 text-white rounded-2xl font-bold hover:bg-amber-700 transition-all shadow-lg active:scale-95">
                            POWRÓT DO GRY
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);
            const [moves, setMoves] = useState(0);
            const [seconds, setSeconds] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [showWinModal, setShowWinModal] = useState(false);
            const [showFullRanking, setShowFullRanking] = useState(false);
            const [rankings, setRankings] = useState([]);
            const [nickname, setNickname] = useState('');
            const timerRef = useRef(null);

            const fetchRankings = () => {
                try {
                    const saved = localStorage.getItem('memoPmpRankings');
                    if (saved) {
                        const data = JSON.parse(saved);
                        setRankings(Array.isArray(data) ? data.sort((a,b) => a.seconds - b.seconds).slice(0, 50) : []);
                    }
                } catch (e) {
                    console.error("Błąd ładowania rankingu", e);
                    setRankings([]);
                }
            };

            useEffect(() => {
                init();
                fetchRankings();
            }, []);

            const init = () => {
                const deck = [...IMAGE_FILES, ...IMAGE_FILES]
                    .sort(() => Math.random() - 0.5)
                    .map((img, i) => ({ id: i, img }));
                setCards(deck);
                setFlipped([]);
                setSolved([]);
                setMoves(0);
                setSeconds(0);
                setIsActive(false);
                setShowWinModal(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            useEffect(() => {
                if (isActive && solved.length < cards.length) {
                    timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                } else if (solved.length === cards.length && cards.length > 0) {
                    clearInterval(timerRef.current);
                    setTimeout(() => setShowWinModal(true), 600);
                }
                return () => clearInterval(timerRef.current);
            }, [isActive, solved.length, cards.length]);

            const handleClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                if (!isActive) setIsActive(true);
                
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);
                
                if (newFlipped.length === 2) {
                    setDisabled(true);
                    setMoves(m => m + 1);
                    if (cards[newFlipped[0]].img === cards[newFlipped[1]].img) {
                        setSolved(s => [...s, ...newFlipped]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => { 
                            setFlipped([]); 
                            setDisabled(false); 
                        }, 1000);
                    }
                }
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const handleSave = () => {
                if (!nickname.trim()) return alert("Podaj swoje imię, bohaterze!");
                const newEntry = {
                    nickname: nickname.trim(),
                    time: formatTime(seconds),
                    seconds,
                    moves,
                    date: new Date().toISOString()
                };
                const updated = [...rankings, newEntry].sort((a,b) => a.seconds - b.seconds).slice(0, 50);
                localStorage.setItem('memoPmpRankings', JSON.stringify(updated));
                setRankings(updated);
                setNickname('');
                init();
            };

            return (
                <div className="flex flex-col items-center p-4 min-h-screen">
                    <header className="w-full max-w-md py-8">
                        <h1 className="gothic-title">Poszukaj Mnie Panie</h1>
                    </header>

                    <div className="flex gap-10 mb-8 font-bold text-white bg-stone-900/80 px-10 py-4 rounded-2xl backdrop-blur-md border border-white/10 shadow-2xl">
                        <div className="text-center">
                            <p className="text-[10px] uppercase opacity-50 tracking-widest">Czas</p>
                            <p className="text-2xl">{formatTime(seconds)}</p>
                        </div>
                        <div className="text-center border-l border-white/20 pl-10">
                            <p className="text-[10px] uppercase opacity-50 tracking-widest">Ruchy</p>
                            <p className="text-2xl">{moves}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-4 gap-3 w-full max-w-md">
                        {cards.map(c => (
                            <div key={c.id} onClick={() => handleClick(c.id)} className="aspect-square cursor-pointer perspective-1000">
                                <div className={`relative w-full h-full transition-all duration-500 transform-style-3d ${flipped.includes(c.id) || solved.includes(c.id) ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute w-full h-full backface-hidden bg-stone-800 rounded-xl flex items-center justify-center text-amber-500 text-4xl font-light border-2 border-stone-700 shadow-xl">
                                        ?
                                    </div>
                                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white rounded-xl border-2 border-amber-500 overflow-hidden shadow-2xl">
                                        <img src={c.img} className="w-full h-full object-cover" onError={(e) => {e.target.src='https://via.placeholder.com/150?text=Brak'}} />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-12 flex gap-4 w-full max-w-md">
                        <button onClick={init} className="flex-1 py-5 bg-stone-800 text-white rounded-2xl font-bold hover:bg-stone-700 transition shadow-lg border-b-4 border-stone-950 uppercase tracking-widest text-sm">Nowa Rozgrywka</button>
                        <button onClick={() => setShowFullRanking(true)} className="flex-1 py-5 bg-amber-600 text-white rounded-2xl font-bold hover:bg-amber-500 transition shadow-lg border-b-4 border-amber-800 uppercase tracking-widest text-sm">Ranking</button>
                    </div>

                    {showWinModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[300] p-4 backdrop-blur-md">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm text-center animate-pop shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                <div className="mb-6 bg-amber-50 rounded-3xl overflow-hidden p-2 border border-amber-100 min-h-[200px] flex items-center justify-center">
                                    <img 
                                        src="win2.png" 
                                        alt="Zwycięstwo" 
                                        className="w-full h-52 object-contain"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.parentNode.innerHTML = '<span class="text-7xl">🏆</span>';
                                        }}
                                    />
                                </div>
                                
                                <h2 className="text-3xl font-black text-stone-900 mb-2" style={{fontFamily: 'Cinzel'}}>Zwycięstwo!</h2>
                                <p className="text-stone-500 mb-8 font-medium italic">Twoje imię zostanie zapisane w kronikach.</p>
                                
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-stone-100 rounded-2xl p-4">
                                        <p className="text-[10px] text-stone-400 uppercase font-bold tracking-widest">Czas</p>
                                        <p className="text-2xl font-black text-stone-800">{formatTime(seconds)}</p>
                                    </div>
                                    <div className="bg-stone-100 rounded-2xl p-4">
                                        <p className="text-[10px] text-stone-400 uppercase font-bold tracking-widest">Ruchy</p>
                                        <p className="text-2xl font-black text-stone-800">{moves}</p>
                                    </div>
                                </div>
                                
                                <input 
                                    type="text" 
                                    placeholder="Wpisz swój nick..." 
                                    className="w-full p-5 border-2 border-stone-100 rounded-2xl mb-4 text-center text-xl outline-none focus:border-amber-500 transition-all bg-stone-50 shadow-inner"
                                    value={nickname}
                                    onChange={(e) => setNickname(e.target.value)}
                                    autoFocus
                                />
                                
                                <button onClick={handleSave} className="w-full py-5 bg-amber-600 text-white rounded-2xl font-black text-lg hover:bg-amber-500 transition-all active:scale-95 shadow-[0_10px_20px_rgba(217,119,6,0.3)] uppercase tracking-wider">
                                    Zapisz Wynik
                                </button>
                            </div>
                        </div>
                    )}

                    <FullRankingModal 
                        isOpen={showFullRanking} 
                        onClose={() => setShowFullRanking(false)} 
                        rankings={rankings} 
                    />
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
