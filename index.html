<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poszukaj Mnie Panie</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .pattern-bg {
            background-image: url('1777988250540-019df85b-53a7-74e3-9ff1-6179b1df9a37.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        /* Styl nagłówka z nową czcionką */
        .gothic-title {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Tło okna rankingowego z Twoim plikiem */
        .ranking-modal-content {
            background-image: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), url('okno rankingowe.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid #d4a574;
        }

        .rank-row {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(2px);
        }
        
        .medal-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border-radius: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-win { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="pattern-bg min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KONFIGURACJA RANKINGU ONLINE ---
        // Aby ranking działał u wszystkich, wpisz tutaj dane z jsonbin.io
        const JSONBIN_API_KEY = '$2a$10$YOUR_KEY_HERE'; 
        const JSONBIN_BIN_ID = 'YOUR_BIN_ID_HERE';

        const IMAGE_FILES = ['1.jpeg', '2.jpeg', '3.jpeg', '4.png', '5.png', '6.png', '7.png', '8.png'];

        const RankingBadge = ({ position }) => {
            const styles = {
                1: { background: 'linear-gradient(135deg, #FFD700 0%, #FFA500 100%)', icon: '🥇' },
                2: { background: 'linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%)', icon: '🥈' },
                3: { background: 'linear-gradient(135deg, #CD7F32 0%, #8B4513 100%)', icon: '🥉' }
            };
            if (position <= 3) {
                return (
                    <div className="medal-badge w-10 h-10 shadow-md" style={{background: styles[position].background}}>
                        {styles[position].icon}
                    </div>
                );
            }
            return <span className="text-lg font-bold text-stone-400 w-10 text-center">#{position}</span>;
        };

        const FullRankingModal = ({ isOpen, onClose, rankings }) => {
            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                    <div className="ranking-modal-content rounded-2xl max-w-2xl w-full max-h-[85vh] overflow-hidden shadow-2xl flex flex-col">
                        <div className="bg-stone-800/90 text-white p-6 text-center border-b-2 border-amber-500">
                            <h2 className="text-3xl font-bold tracking-widest" style={{fontFamily: 'Cinzel'}}>Sala Chwały</h2>
                        </div>
                        <div className="overflow-y-auto p-4 space-y-2 flex-1">
                            {rankings.length === 0 ? (
                                <p className="text-center p-10 font-bold">Ładowanie wyników...</p>
                            ) : (
                                rankings.map((entry, idx) => (
                                    <div key={idx} className="rank-row border-l-4 border-amber-600 p-3 rounded flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <RankingBadge position={idx + 1} />
                                            <div>
                                                <p className="font-bold text-stone-900">{entry.nickname}</p>
                                                <p className="text-[10px] uppercase text-stone-500">{new Date(entry.date).toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-black text-amber-700">{entry.time}</p>
                                            <p className="text-[10px] text-stone-500">{entry.moves} ruchów</p>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                        <button onClick={onClose} className="m-4 py-3 bg-stone-900 text-white rounded-xl font-bold hover:bg-black transition">
                            POWRÓT DO GRY
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);
            const [moves, setMoves] = useState(0);
            const [seconds, setSeconds] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [showWinModal, setShowWinModal] = useState(false);
            const [showFullRanking, setShowFullRanking] = useState(false);
            const [rankings, setRankings] = useState([]);
            const [nickname, setNickname] = useState('');
            const timerRef = useRef(null);

            // Funkcja pobierania rankingu (Online + LocalFallback)
            const fetchRankings = async () => {
                const localData = JSON.parse(localStorage.getItem('memoPmpRankings') || '[]');
                setRankings(localData.sort((a,b) => a.seconds - b.seconds).slice(0, 50));
                
                // Tutaj można dodać logikę fetch() z JSONBin w przyszłości
            };

            useEffect(() => {
                init();
                fetchRankings();
            }, []);

            const init = () => {
                const deck = [...IMAGE_FILES, ...IMAGE_FILES]
                    .sort(() => Math.random() - 0.5)
                    .map((img, i) => ({ id: i, img }));
                setCards(deck);
                setFlipped([]);
                setSolved([]);
                setMoves(0);
                setSeconds(0);
                setIsActive(false);
                setShowWinModal(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            useEffect(() => {
                if (isActive && solved.length < cards.length) {
                    timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                } else if (solved.length === cards.length && cards.length > 0) {
                    clearInterval(timerRef.current);
                    setShowWinModal(true);
                }
                return () => clearInterval(timerRef.current);
            }, [isActive, solved.length]);

            const handleClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                if (!isActive) setIsActive(true);
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setDisabled(true);
                    setMoves(m => m + 1);
                    if (cards[newFlipped[0]].img === cards[newFlipped[1]].img) {
                        setSolved(s => [...s, ...newFlipped]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => { setFlipped([]); setDisabled(false); }, 1000);
                    }
                }
            };

            const handleSave = () => {
                if (!nickname.trim()) return alert("Wpisz imię!");
                const newEntry = {
                    nickname: nickname.trim(),
                    time: formatTime(seconds),
                    seconds,
                    moves,
                    date: new Date().toISOString()
                };
                const updated = [...rankings, newEntry].sort((a,b) => a.seconds - b.seconds).slice(0, 50);
                localStorage.setItem('memoPmpRankings', JSON.stringify(updated));
                setRankings(updated);
                init();
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            return (
                <div className="flex flex-col items-center p-4">
                    <header className="w-full max-w-md flex justify-between items-center mb-6">
                        <h1 className="gothic-title">Poszukaj Mnie Panie</h1>
                    </header>

                    <div className="flex gap-8 mb-6 font-bold text-white bg-black/40 px-6 py-2 rounded-full backdrop-blur-md border border-white/20">
                        <span>⏱️ {formatTime(seconds)}</span>
                        <span>🎯 {moves}</span>
                    </div>

                    <div className="grid grid-cols-4 gap-2 w-full max-w-sm">
                        {cards.map(c => (
                            <div key={c.id} onClick={() => handleClick(c.id)} className="aspect-square cursor-pointer perspective-1000">
                                <div className={`relative w-full h-full transition-all duration-500 transform-style-3d ${flipped.includes(c.id) || solved.includes(c.id) ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute w-full h-full backface-hidden bg-stone-900 rounded-lg flex items-center justify-center text-amber-500 text-2xl font-black border-2 border-stone-700 shadow-xl">
                                        ?
                                    </div>
                                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white rounded-lg border-2 border-amber-500 overflow-hidden shadow-2xl">
                                        <img src={c.img} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-8 flex gap-4">
                        <button onClick={init} className="px-6 py-3 bg-stone-800 text-white rounded-lg font-bold hover:bg-stone-700 transition shadow-lg">NOWA GRA</button>
                        <button onClick={() => setShowFullRanking(true)} className="px-6 py-3 bg-amber-600 text-white rounded-lg font-bold hover:bg-amber-500 transition shadow-lg">🏆 RANKING</button>
                    </div>

                    {/* MODAL WYGRANEJ Z GIFEM */}
                    {showWinModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm text-center animate-win shadow-[0_0_50px_rgba(255,191,0,0.5)]">
                                <img 
    src="win.gif" 
    alt="Gratulacje!" 
    className="w-full h-48 object-contain mb-4 rounded-xl"
/>
                                <h2 className="text-3xl font-black text-stone-800 mb-2">ZNAKOMICE!</h2>
                                <p className="text-stone-600 mb-6">Ukończyłeś grę w czasie <span className="font-bold text-amber-600">{formatTime(seconds)}</span></p>
                                
                                <input 
                                    type="text" 
                                    placeholder="Twoje Imię..." 
                                    className="w-full p-4 border-2 border-stone-200 rounded-xl mb-4 text-center text-xl outline-none focus:border-amber-500"
                                    value={nickname}
                                    onChange={(e) => setNickname(e.target.value)}
                                />
                                
                                <div className="flex flex-col gap-2">
                                    <button onClick={handleSave} className="w-full py-4 bg-amber-500 text-white rounded-xl font-bold text-lg hover:shadow-xl transition">ZAPISZ W RANKINGU</button>
                                    <button onClick={init} className="w-full py-3 text-stone-400 font-bold">ZAGRAJ PONOWNIE BEZ ZAPISU</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <FullRankingModal 
                        isOpen={showFullRanking} 
                        onClose={() => setShowFullRanking(false)} 
                        rankings={rankings} 
                    />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
