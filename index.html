<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poszukaj Mnie Panie</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .pattern-bg {
            background-color: #e7e5e4;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(0,0,0,.05) 35px, rgba(0,0,0,.05) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(0,0,0,.03) 35px, rgba(0,0,0,.03) 70px);
        }
    </style>
</head>
<body class="pattern-bg overflow-x-hidden">
    <div id="root"></div>
    
    <!-- Logo w prawym dolnym rogu -->
    <div class="fixed bottom-4 right-4 z-40 shadow-lg rounded-full overflow-hidden border-2 border-white">
        <img src="IMG_20260505_155346.png" alt="Logo" class="w-24 h-24 object-cover">
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Dopasowane do Twoich plików
        const IMAGE_FILES = ['1.jpeg', '2.jpeg', '3.jpeg', '4.png', '5.png', '6.png', '7.png', '8.png'];

        const App = () => {
            const [cards, setCards] = useState([]);
            const [flipped, setFlipped] = useState([]);
            const [solved, setSolved] = useState([]);
            const [disabled, setDisabled] = useState(false);
            const [moves, setMoves] = useState(0);
            const [seconds, setSeconds] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const timerRef = useRef(null);

            const init = () => {
                const deck = [...IMAGE_FILES, ...IMAGE_FILES]
                    .sort(() => Math.random() - 0.5)
                    .map((img, i) => ({ id: i, img }));
                setCards(deck);
                setFlipped([]);
                setSolved([]);
                setMoves(0);
                setSeconds(0);
                setIsActive(false);
                if (timerRef.current) clearInterval(timerRef.current);
            };

            useEffect(() => { init(); }, []);

            useEffect(() => {
                if (isActive && solved.length < cards.length) {
                    timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                } else { clearInterval(timerRef.current); }
                return () => clearInterval(timerRef.current);
            }, [isActive, solved.length]);

            const handleClick = (id) => {
                if (disabled || flipped.includes(id) || solved.includes(id)) return;
                if (!isActive) setIsActive(true);
                const newFlipped = [...flipped, id];
                setFlipped(newFlipped);
                if (newFlipped.length === 2) {
                    setDisabled(true);
                    setMoves(m => m + 1);
                    if (cards[newFlipped[0]].img === cards[newFlipped[1]].img) {
                        setSolved(s => [...s, ...newFlipped]);
                        setFlipped([]);
                        setDisabled(false);
                    } else {
                        setTimeout(() => { setFlipped([]); setDisabled(false); }, 1000);
                    }
                }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            return (
                <div className="flex flex-col items-center p-2 min-h-screen">
                    <h1 className="text-xl font-black my-4 text-stone-800 uppercase tracking-widest">Poszukaj Mnie Panie</h1>
                    <div className="flex gap-4 mb-6 text-sm font-bold text-stone-500 bg-white px-4 py-2 rounded-full border shadow-sm">
                        <span>Czas: {formatTime(seconds)}</span>
                        <span>Ruchy: {moves}</span>
                    </div>
                    <div className="grid grid-cols-4 gap-2 w-full max-w-sm">
                        {cards.map(c => (
                            <div key={c.id} onClick={() => handleClick(c.id)} className="aspect-square cursor-pointer perspective-1000">
                                <div className={`relative w-full h-full transition-all duration-500 transform-style-3d ${flipped.includes(c.id) || solved.includes(c.id) ? 'rotate-y-180' : ''}`}>
                                    <div className="absolute w-full h-full backface-hidden bg-stone-800 rounded-lg flex items-center justify-center text-white font-bold border-2 border-stone-600">
                                        ?
                                    </div>
                                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-white rounded-lg border-2 border-amber-500 overflow-hidden shadow-md">
                                        <img src={c.img} className="w-full h-full object-cover" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={init} className="mt-8 px-6 py-2 bg-stone-800 text-white rounded-full font-bold text-xs uppercase tracking-widest">Nowa gra</button>
                    {solved.length === cards.length && cards.length > 0 && (
                        <div className="fixed inset-0 bg-stone-900/90 flex items-center justify-center z-50 p-6">
                            <div className="bg-white p-8 rounded-2xl text-center max-w-xs w-full shadow-2xl">
                                <h2 className="text-2xl font-bold mb-6 text-stone-800">🎉 Wygrana! 🎉</h2>
                                <div className="space-y-3 mb-6 bg-stone-50 p-4 rounded-lg">
                                    <div className="text-lg font-semibold text-stone-700">
                                        <span className="block text-stone-500 text-sm mb-1">Czas</span>
                                        <span className="text-2xl text-amber-600">{formatTime(seconds)}</span>
                                    </div>
                                    <div className="text-lg font-semibold text-stone-700">
                                        <span className="block text-stone-500 text-sm mb-1">Liczba ruchów</span>
                                        <span className="text-2xl text-amber-600">{moves}</span>
                                    </div>
                                </div>
                                <button onClick={init} className="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-xl font-bold uppercase tracking-wider transition">Zagraj od nowa</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
